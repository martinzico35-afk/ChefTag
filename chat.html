<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat with Chef | ChefTag</title>
  <meta name="description" content="Chat directly with a private chef on ChefTag. Discuss your event, menu, and booking details.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="16x16" >
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-page { display: flex; flex-direction: column; height: calc(100vh - 71px); }

    /* Identity Form */
    .chat-identity {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 24px;
    }
    .chat-identity-box {
      max-width: 420px;
      width: 100%;
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .chat-identity-box .identity-avatar {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 3px solid var(--line);
    }
    .chat-identity-box h2 { margin-bottom: 4px; font-size: 1.35rem; }
    .chat-identity-box .identity-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 24px; }
    .chat-identity-box .field { margin-bottom: 14px; text-align: left; }
    .chat-identity-box .field input {
      width: 100%; min-height: 48px; padding: 0 14px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--white); color: var(--ink); font-size: 0.95rem;
      box-shadow: 0 8px 20px rgba(26,37,33,0.05); transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-identity-box .field input:focus { border-color: var(--basil); outline: 3px solid rgba(46,107,79,0.16); }
    .chat-identity-box .field input::placeholder { color: #a3aea8; font-weight: 400; }
    .chat-identity-box .identity-error { color: var(--tomato); font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; display: none; }
    .chat-identity-box .start-chat-btn {
      width: 100%; padding: 14px; border: 0; border-radius: 8px; background: var(--basil);
      color: var(--white); font-weight: 900; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .chat-identity-box .start-chat-btn:hover { background: #245a42; transform: translateY(-1px); }

    /* Chat Container */
    .chat-container { display: none; flex-direction: column; flex: 1; overflow: hidden; }

    .chat-header {
      display: flex; align-items: center; gap: 16px; padding: 14px 24px;
      border-bottom: 1px solid var(--line); background: var(--white);
    }
    .chat-header .back-link {
      display: inline-flex; align-items: center; gap: 6px; font-weight: 750;
      color: var(--basil); font-size: 0.92rem; flex-shrink: 0;
    }
    .chat-header .back-link:hover { color: var(--tomato); }
    .chat-header-info { flex: 1; }
    .chat-header-info h2 { font-size: 1.15rem; margin-bottom: 0; }
    .chat-header-info .chat-chef-loc { color: var(--muted); font-size: 0.82rem; font-weight: 700; }
    .chat-online-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--basil); margin-right: 6px; vertical-align: middle;
    }

    /* Messages Area */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px; display: flex;
      flex-direction: column; gap: 12px;
      background: linear-gradient(180deg, #f9f8f3 0%, #f4f2eb 100%);
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .chat-date-divider {
      text-align: center; color: var(--muted); font-size: 0.76rem; font-weight: 750;
      text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 0;
    }
    .chat-date-divider span {
      display: inline-block; padding: 4px 14px; border-radius: 999px;
      background: rgba(90,107,101,0.08);
    }

    .chat-bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
    .chat-bubble-wrap.client { align-self: flex-end; align-items: flex-end; }
    .chat-bubble-wrap.chef { align-self: flex-start; align-items: flex-start; }

    .chat-sender-name { font-size: 0.76rem; font-weight: 800; color: var(--muted); margin-bottom: 4px; padding: 0 4px; }

    .chat-bubble {
      padding: 12px 16px; border-radius: 16px; font-size: 0.94rem; line-height: 1.5;
      word-wrap: break-word; position: relative;
    }
    .chat-bubble.client {
      background: var(--ink); color: var(--white); border-bottom-right-radius: 4px;
    }
    .chat-bubble.chef {
      background: var(--white); color: var(--ink); border-bottom-left-radius: 4px;
      border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(26,37,33,0.06);
    }

    .chat-time {
      display: block; font-size: 0.7rem; color: var(--muted); margin-top: 4px; padding: 0 4px;
    }
    .chat-bubble.client .chat-time { color: rgba(255,255,255,0.6); text-align: right; }

    .chat-read-receipt {
      display: inline-block; font-size: 0.65rem; margin-left: 4px; font-weight: 800;
      color: rgba(255,255,255,0.5); letter-spacing: -1px;
    }
    .chat-read-receipt.read { color: #4fc3f7; }

    .chat-typing {
      display: none; align-self: flex-start; padding: 12px 16px; background: var(--white);
      border: 1px solid var(--line); border-radius: 16px; border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(26,37,33,0.06);
    }
    .chat-typing-dots { display: flex; gap: 4px; }
    .chat-typing-dots span {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted); opacity: 0.5;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .chat-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* Input Bar */
    .chat-input-bar {
      display: flex; gap: 10px; padding: 14px 24px; border-top: 1px solid var(--line);
      background: var(--white);
    }
    .chat-input-bar input {
      flex: 1; min-height: 48px; padding: 0 16px; border: 1px solid var(--line);
      border-radius: 999px; background: #f9f8f3; font-size: 0.95rem; color: var(--ink);
      transition: border-color 0.2s;
    }
    .chat-input-bar input:focus { border-color: var(--basil); outline: 3px solid rgba(46,107,79,0.16); }
    .chat-input-bar input::placeholder { color: #a3aea8; }
    .chat-send-btn {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
      background: var(--basil); color: var(--white); display: grid; place-items: center;
      border: 0; cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .chat-send-btn:hover { background: #245a42; transform: translateY(-1px); }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .chat-send-btn svg { width: 20px; height: 20px; }

    /* Empty State */
    .chat-empty { text-align: center; padding: 60px 24px; color: var(--muted); }
    .chat-empty svg { margin-bottom: 16px; color: var(--line); }
    .chat-empty h3 { margin-bottom: 8px; color: var(--ink); }
    .chat-empty p { font-size: 0.92rem; max-width: 36ch; margin: 0 auto; }

    /* System message */
    .chat-system {
      text-align: center; padding: 8px 16px; font-size: 0.8rem; color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 640px) {
      .chat-messages { padding: 16px; }
      .chat-input-bar { padding: 10px 14px; }
      .chat-bubble-wrap { max-width: 88%; }
      .chat-header { padding: 12px 16px; }
      .chat-identity-box { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Primary">
    <div class="header-left">
      <a class="brand" href="index.html" aria-label="ChefTag home">
        <img class="brand-logo" src="assets/cheftag-logo.png" alt="ChefTag" width="36" height="36">
        <span>ChefTag</span>
      </a>
    </div>
    <nav class="nav-links" aria-label="Site">
      <a href="index.html">Chefs</a>
    </nav>
        <button class="search-icon-btn" type="button" aria-label="Search chefs" title="Search chefs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </header>

  <main class="chat-page">
    <!-- Step 1: Client Identity -->
    <div id="identitySection" class="chat-identity">
      <div class="chat-identity-box">
        <img id="identityChefImg" class="identity-avatar" src="https://sfile.chatglm.cn/images-ppt/86026829c333.jpg" alt="">
        <h2 id="identityChefName">Chat with Chef</h2>
        <p class="identity-sub">Enter your details to start a conversation</p>
        <p class="identity-error" id="identityError"></p>
        <div class="field">
          <input type="text" id="clientNameInput" placeholder="Your full name" autocomplete="name">
        </div>
        <div class="field">
          <input type="email" id="clientEmailInput" placeholder="Your email address" autocomplete="email">
        </div>
        <div class="field">
          <input type="tel" id="clientPhoneInput" placeholder="Phone number (optional)" autocomplete="tel">
        </div>
        <button class="start-chat-btn" id="startChatBtn" type="button">Start Chat</button>
      </div>
    </div>

    <!-- Step 2: Chat Interface -->
    <div id="chatContainer" class="chat-container">
      <div class="chat-header">
        <a href="index.html" class="back-link">&larr; Back</a>
        <div class="chat-header-info">
          <h2 id="chatChefName">Chef</h2>
          <span class="chat-chef-loc"><span class="chat-online-dot"></span>Online</span>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <h3>Start the conversation</h3>
          <p>Say hello, ask about menus, availability, or pricing. The chef will reply here.</p>
        </div>
      </div>
      <div class="chat-typing" id="chatTyping"><div class="chat-typing-dots"><span></span><span></span><span></span></div></div>
      <div class="chat-input-bar">
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <button class="chat-send-btn" id="sendBtn" type="button" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth-check.js"></script>
  <script src="chat.js"></script>
</body>
</html>
